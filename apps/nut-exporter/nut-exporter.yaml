apiVersion: apps/v1
kind: Deployment
metadata:
  name: nut-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: nut-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nut-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nut-exporter
    spec:
      containers:
        - name: nut-exporter
          image: druggeri/nut_exporter:3.3.0
          args:
            - --nut.server=192.168.1.50
            - --nut.vars_enable=battery.charge,battery.runtime,battery.voltage,input.voltage,output.voltage,ups.load,ups.status,ups.temperature
          ports:
            - name: metrics
              containerPort: 9199
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nut-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: nut-exporter
spec:
  selector:
    app.kubernetes.io/name: nut-exporter
  ports:
    - name: metrics
      port: 9199
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nut-exporter
  namespace: monitoring
  labels:
    release: monitoring
    app.kubernetes.io/name: nut-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nut-exporter
  endpoints:
    - port: metrics
      path: /ups_metrics
      interval: 30s
      params:
        ups: ["keorsp"]
