apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: immich
  annotations:
    longhorn.io/disk-selector: "disk-1"
    longhorn.io/number-of-replicas: "1"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 450Gi
  volumeName: pvc-04e0a0ea-ebcc-4ae1-acbe-03c1f9a2bed2
---
