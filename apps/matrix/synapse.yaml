apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: matrix-postgres-pvc
  namespace: matrix
  labels:
    app: matrix-postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synapse-data-pvc
  namespace: matrix
  labels:
    app: synapse
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-postgres
  namespace: matrix
  labels:
    app: matrix-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: matrix-postgres
  template:
    metadata:
      labels:
        app: matrix-postgres
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: homelab
      containers:
        - name: postgres
          image: postgres:18-alpine
          args:
            - "postgres"
            - "-c"
            - "max_wal_size=256MB"
            - "-c"
            - "min_wal_size=80MB"
            - "-c"
            - "checkpoint_timeout=5min"
            - "-c"
            - "wal_keep_size=128MB"
            - "-c"
            - "log_min_messages=WARNING"
          env:
            - name: POSTGRES_DB
              value: synapse
            - name: POSTGRES_USER
              value: synapse
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8 --locale=C"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: matrix-postgres
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: matrix-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: matrix-postgres
  namespace: matrix
spec:
  selector:
    app: matrix-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse
  namespace: matrix
  labels:
    app: synapse
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: synapse
  template:
    metadata:
      labels:
        app: synapse
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: homelab
      initContainers:
        - name: generate-signing-key
          image: ghcr.io/element-hq/synapse:v1.156.0
          command:
            - sh
            - -c
            - test -f /data/homeserver.signing.key || generate_signing_key -o /data/homeserver.signing.key
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 991
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: synapse-data
              mountPath: /data
      containers:
        - name: synapse
          image: ghcr.io/element-hq/synapse:v1.156.0
          env:
            - name: SYNAPSE_CONFIG_PATH
              value: /config/homeserver.yaml
          ports:
            - containerPort: 8008
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 991
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: synapse-data
              mountPath: /data
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: synapse-data
          persistentVolumeClaim:
            claimName: synapse-data-pvc
        - name: config
          secret:
            secretName: synapse-config
---
apiVersion: v1
kind: Service
metadata:
  name: synapse
  namespace: matrix
spec:
  selector:
    app: synapse
  ports:
    - port: 8008
      targetPort: 8008
      name: http
