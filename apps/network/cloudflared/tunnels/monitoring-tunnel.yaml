apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-monitoring
  namespace: cloudflared
spec:
  selector:
    matchLabels:
      app: cloudflared-monitoring
  template:
    metadata:
      labels:
        app: cloudflared-monitoring
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monitoring-tunnel-token
                  key: token
          command:
            - cloudflared
            - tunnel
            - --no-autoupdate
            - run
          livenessProbe:
            exec:
              command:
                - cloudflared
                - tunnel
                - --version
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
