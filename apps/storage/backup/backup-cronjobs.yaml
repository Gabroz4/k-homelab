apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-minio-backup
  namespace: nextcloud
spec:
  schedule: "0 4 */3 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: backup
            image: minio/mc:RELEASE.2024-11-17T19-35-25Z  # pin this, update periodically
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 1Gi
            env:
            - name: MINIO_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secretKey
            command:
            - /bin/sh
            - -c
            - |
              set -e

              mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

              TARGET="/backups/nextcloud/data"
              mkdir -p "$TARGET"

              echo "== Mirroring minio/nextcloud -> $TARGET =="
              mc mirror --overwrite --remove minio/nextcloud "$TARGET"

              echo "== Done =="
            volumeMounts:
            - name: backups
              mountPath: /backups
          volumes:
          - name: backups
            hostPath:
              path: /mnt/backups
              type: Directory
