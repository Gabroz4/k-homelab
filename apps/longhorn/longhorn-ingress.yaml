apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-internal
  namespace: longhorn-system
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: longhorn-system-authentik-forward-auth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - longhorn.${LOCAL_DOMAIN}
      secretName: wildcard-local-tls
  rules:
    - host: longhorn.${LOCAL_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
