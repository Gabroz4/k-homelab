apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: monitoring
data:
  settings.yaml: |
    title: Homelab
    headerStyle: clean
    background:
      image: https://images.unsplash.com/photo-1506318137071-a8e063b4bec0
      blur: sm
      brightness: 50
      opacity: 50
    theme: dark
    color: slate
    target: _blank
    layout:
      Online:
        style: row
        columns: 4
      Local:
        style: row
        columns: 4
      Media:
        style: row
        columns: 4
    providers:
      openweathermap: openweathermapapikey
      weather: weatherapikey

  services.yaml: |
    - Online:
        - Nextcloud:
            href: https://nextcloud.${PUBLIC_DOMAIN}
            description: Files, calendar, contacts (S3-backed)
            icon: nextcloud.png
            namespace: nextcloud
            app: nextcloud
        - Immich:
            href: https://immich.${PUBLIC_DOMAIN}
            description: Photo and video library
            icon: immich.png
            namespace: immich
            app: immich
        - Jellyfin:
            href: https://jellyfin.${PUBLIC_DOMAIN}
            description: Movies and TV
            icon: jellyfin.png
            namespace: jellyfin
            app: jellyfin
        - Navidrome:
            href: https://navidrome.${PUBLIC_DOMAIN}
            description: Music streaming
            icon: navidrome.png
            namespace: music
            app: navidrome
        - Grafana:
            href: https://grafana.${PUBLIC_DOMAIN}
            description: Dashboards
            icon: grafana.png
            namespace: monitoring
            app: grafana
        - AdGuard Home:
            href: https://adguard.${PUBLIC_DOMAIN}
            description: DNS-level ad blocker
            icon: adguard-home.png
            namespace: adguard
            app: adguardhome
        - Authentik:
            href: https://authentik.${PUBLIC_DOMAIN}
            description: SSO / identity provider
            icon: authentik.png
            namespace: authentik
            app: authentik

    - Media:
        - Jellyfin:
            href: https://jellyfin.${LOCAL_DOMAIN}
            description: Movies and TV (LAN)
            icon: jellyfin.png
            namespace: jellyfin
            app: jellyfin
        - Navidrome:
            href: https://navidrome.${LOCAL_DOMAIN}
            description: Music streaming (LAN)
            icon: navidrome.png
            namespace: music
            app: navidrome
        - Sonarr:
            href: https://sonarr.${LOCAL_DOMAIN}
            description: TV series management
            icon: sonarr.png
            namespace: jellyfin
            app: sonarr
        - Radarr:
            href: https://radarr.${LOCAL_DOMAIN}
            description: Movie management
            icon: radarr.png
            namespace: jellyfin
            app: radarr
        - Lidarr:
            href: https://lidarr.${LOCAL_DOMAIN}
            description: Music management
            icon: lidarr.png
            namespace: music
            app: lidarr
        - Prowlarr:
            href: https://prowlarr.${LOCAL_DOMAIN}
            description: Indexer manager
            icon: prowlarr.png
            namespace: jellyfin
            app: prowlarr
        - Seerr:
            href: https://seerr.${LOCAL_DOMAIN}
            description: Media request portal
            icon: jellyseerr.png
            namespace: jellyfin
            app: seerr
        - qBittorrent:
            href: https://qbittorrent.${LOCAL_DOMAIN}
            description: Torrent client
            icon: qbittorrent.png
            namespace: jellyfin
            app: qbittorrent

    - Local:
        - Grafana:
            href: https://grafana.${LOCAL_DOMAIN}
            description: Dashboards (LAN)
            icon: grafana.png
            namespace: monitoring
            app: grafana
        - AdGuard Home:
            href: https://adguard.${LOCAL_DOMAIN}
            description: DNS-level ad blocker (LAN)
            icon: adguard-home.png
            namespace: adguard
            app: adguardhome
        - Prometheus:
            href: https://prometheus.${LOCAL_DOMAIN}
            description: Metrics database
            icon: prometheus.png
            namespace: monitoring
            app: prometheus
        - Headlamp:
            href: https://headlamp.${LOCAL_DOMAIN}
            description: Kubernetes dashboard
            icon: mdi-kubernetes
            namespace: kube-system
            app: headlamp
        - MinIO:
            href: https://minio.${LOCAL_DOMAIN}
            description: S3-compatible object storage
            icon: minio.png
            namespace: minio
            app: minio
        - Longhorn:
            href: http://192.168.1.50:32286
            description: Distributed block storage
            icon: longhorn.png
            namespace: longhorn-system
            app: longhorn-frontend
        - Pankha:
            href: https://pankha.${LOCAL_DOMAIN}
            description: Fan control and hardware monitoring
            icon: mdi-fan
            namespace: pankha
            app: pankha-app

  bookmarks.yaml: |
    - External:
        - Cloudflare Dashboard:
            - abbr: CF
              href: https://dash.cloudflare.com
        - GitHub Repo:
            - abbr: GH
              href: https://github.com/Gabroz4/k-homelab

    - Docs:
        - Kubernetes Docs:
            - abbr: K8
              href: https://kubernetes.io/docs/
        - gethomepage Docs:
            - abbr: HP
              href: https://gethomepage.dev/

  widgets.yaml: |
    - resources:
        backend: kubernetes
        expanded: true
        cpu: true
        memory: true
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: k3s
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short
          hourCycle: h23

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: |
    {}

  proxmox.yaml: |
    {}

  custom.css: ""
  custom.js: ""
