apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab
      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
        options:
          - name: ndots
            value: "2"
          - name: edns0
          - name: timeout
            value: "2"
          - name: attempts
            value: "2"
      
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:latest

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            privileged: false
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          
          ports:
            - containerPort: 5055
              name: http
              protocol: TCP
          
          env:
            - name: TZ
              value: "Europe/Rome"
            - name: LOG_LEVEL
              value: "info"

          livenessProbe:
            httpGet:
              path: /api/v1/status
              port: 5055
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: 5055
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/status
              port: 5055
            failureThreshold: 30
            periodSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /api/v1/status
              port: 5055
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          
          volumeMounts:
            - name: config
              mountPath: /app/config
      
      terminationGracePeriodSeconds: 30
      
      volumes:
        - name: config
          hostPath:
            path: /var/lib/jellyseerr
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: seerr
  namespace: jellyfin
spec:
  selector:
    app: seerr
  ports:
    - port: 5055
      targetPort: 5055
