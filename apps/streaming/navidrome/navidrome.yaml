apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: music
spec:
  replicas: 1
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      containers:
      - name: navidrome
        image: deluan/navidrome:latest
        ports:
        - containerPort: 4533
        env:
        - name: ND_SCANSCHEDULE
          value: "1h"
        - name: ND_LOGLEVEL
          value: "info"
        - name: ND_SESSIONTIMEOUT
          value: "24h"
        - name: ND_BASEURL
          value: ""
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
        volumeMounts:
        - mountPath: /data
          name: data
        - mountPath: /music
          name: music
          readOnly: true
      volumes:
      - name: data
        hostPath:
          path: /opt/navidrome
          type: DirectoryOrCreate
      - name: music
        hostPath:
          path: /home/gabro/Music
          type: Directory