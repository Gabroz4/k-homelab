apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
spec:
  interval: 1h
  releaseName: minio
  chart:
    spec:
      chart: minio
      version: "5.4.0"
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    mode: standalone
    replicas: 1

    existingSecret: minio-root-credentials

    persistence:
      enabled: true
      size: 500Gi

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 1Gi

    service:
      type: ClusterIP
      ports:
        api: 9000
        console: 9001

    consoleService:
      type: ClusterIP

    buckets:
      - name: nextcloud
        policy: none
        purge: false
        versioning: true

    users:
      - accessKey: nextcloud-access-key
        existingSecret: minio-nextcloud-user
        existingSecretKey: secretKey
        policy: readwrite

    ingress:
      enabled: false
