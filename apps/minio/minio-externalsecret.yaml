apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-root-credentials
  namespace: minio
spec:
  refreshInterval: 12h40m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: minio-root-credentials
    creationPolicy: Owner
  data:
    - secretKey: rootUser
      remoteRef:
        key: minio/minio-root-credentials/rootUser
    - secretKey: rootPassword
      remoteRef:
        key: minio/minio-root-credentials/rootPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-nextcloud-user
  namespace: minio
spec:
  refreshInterval: 12h45m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: minio-nextcloud-user
    creationPolicy: Owner
  data:
    - secretKey: secretKey
      remoteRef:
        key: nextcloud/nextcloud-s3/S3_SECRET_KEY
