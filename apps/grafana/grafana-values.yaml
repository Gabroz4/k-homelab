grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: adminUser
    passwordKey: adminPassword
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  plugins:
    - grafana-lokiexplore-app
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-authentik-oauth
        key: client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-authentik-oauth
        key: client-secret
  grafana.ini:
    feature_toggles:
      enable: lokiExploreDataVisualization
    server:
      root_url: https://grafana.gabro.ovh
    auth:
      signout_redirect_url: "https://authentik.gabro.ovh/application/o/grafana/end-session/"
      oauth_auto_login: true
    auth.generic_oauth:
      enabled: true
      name: Authentik
      scopes: "openid email profile"
      auth_url: "https://authentik.gabro.ovh/application/o/authorize/"
      token_url: "http://authentik-server.authentik.svc.cluster.local/application/o/token/"
      api_url: "http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/"
      role_attribute_path: "contains(groups[*], 'admin') && 'Admin' || 'Viewer'"

  sidecar:
    datasources:
      enabled: false
    dashboards:
      enabled: false

  extraVolumes:
    - name: datasources-direct
      configMap:
        name: grafana-datasources
    - name: dashboards-hardware
      configMap:
        name: grafana-dashboard-hardware
    - name: dashboards-logs-custom
      configMap:
        name: grafana-dashboard-logs
    - name: dashboards-kube-overviews
      configMap:
        name: grafana-dashboard-kubernetes-overviews
  extraVolumeMounts:
    - name: datasources-direct
      mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
      subPath: datasource.yaml
    - name: dashboards-hardware
      mountPath: /var/lib/grafana/dashboards/hardware
    - name: dashboards-logs-custom
      mountPath: /var/lib/grafana/dashboards/logs/container-log-search.json
      subPath: container-log-search.json
    - name: dashboards-kube-overviews
      mountPath: /var/lib/grafana/dashboards/kubernetes/k8s_views_global.json
      subPath: k8s_views_global.json
    - name: dashboards-kube-overviews
      mountPath: /var/lib/grafana/dashboards/kubernetes/k8s_views_ns.json
      subPath: k8s_views_ns.json
    - name: dashboards-kube-overviews
      mountPath: /var/lib/grafana/dashboards/kubernetes/k8s_views_nodes.json
      subPath: k8s_views_nodes.json
    - name: dashboards-kube-overviews
      mountPath: /var/lib/grafana/dashboards/kubernetes/k8s_views_pods.json
      subPath: k8s_views_pods.json

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "kubernetes"
          orgId: 1
          folder: "Kubernetes"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes
        - name: "storage"
          orgId: 1
          folder: "Storage"
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/storage
        - name: "logs"
          orgId: 1
          folder: "Logs"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/logs
        - name: "networking"
          orgId: 1
          folder: "Networking"
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/networking
        - name: "hardware"
          orgId: 1
          folder: "Hardware"
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/hardware

  dashboards:
    kubernetes:
      # k8s-views-* (15757-15760) served from grafana-dashboard-kubernetes-overviews ConfigMap
      # with cluster=~"$cluster|" patched in so historical (pre-cluster-label) data still renders.
      k8s-system-coredns:
        gnetId: 15762
        revision: 22
        datasource: Prometheus
      k8s-system-api-server:
        gnetId: 15761
        revision: 21
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
    storage:
      longhorn:
        gnetId: 16888
        revision: 9
        datasource: Prometheus
    logs:
      loki-kubernetes-logs:
        gnetId: 17781
        revision: 1
        datasource: Loki
      # container-log-search served from grafana-dashboard-logs ConfigMap
      # (gnetId 16966 imports leave panel datasources unbound on current Grafana)
      alloy-overview:
        gnetId: 20033
        revision: 3
        datasource: Prometheus
    networking:
      traefik:
        gnetId: 17346
        revision: 9
        datasource: Prometheus
