apiVersion: batch/v1
kind: CronJob
metadata:
  name: restic-prune
  namespace: backup
spec:
  schedule: "0 6 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 4
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 21600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: restic-prune
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: prune
              image: restic/restic:0.18.1
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  prune_repo() {
                    local repo_name="$1"
                    local repo_password_var="$2"
                    local url="rest:http://$REST_USER:$REST_PASSWORD@restic-rest-server.backup.svc.cluster.local:8000/$repo_name"
                    export RESTIC_PASSWORD="$(eval echo "\$$repo_password_var")"
                    echo "== forget+prune: $repo_name =="
                    restic -r "$url" forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune
                    echo "== check: $repo_name =="
                    restic -r "$url" check --read-data-subset=2%
                  }

                  prune_repo immich-files     IMMICH_FILES_PASSWORD
                  prune_repo immich-db        IMMICH_DB_PASSWORD
                  prune_repo nextcloud-db     NEXTCLOUD_DB_PASSWORD
                  prune_repo nextcloud-minio  NEXTCLOUD_MINIO_PASSWORD
                  prune_repo authentik-db     AUTHENTIK_DB_PASSWORD
              env:
                - name: REST_USER
                  valueFrom:
                    secretKeyRef:
                      name: restic-admin-creds
                      key: rest-admin-user
                - name: REST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-admin-creds
                      key: rest-admin-password
                - name: IMMICH_FILES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-admin-creds
                      key: immich-files-password
                - name: IMMICH_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-admin-creds
                      key: immich-db-password
                - name: NEXTCLOUD_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-admin-creds
                      key: nextcloud-db-password
                - name: NEXTCLOUD_MINIO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-admin-creds
                      key: nextcloud-minio-password
                - name: AUTHENTIK_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-admin-creds
                      key: authentik-db-password
