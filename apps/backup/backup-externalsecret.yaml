apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-creds
  namespace: immich
spec:
  refreshInterval: 12h50m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: restic-creds
    creationPolicy: Owner
  data:
    - secretKey: rest-writer-user
      remoteRef:
        key: backup/restic-rest-server/writer-user
    - secretKey: rest-writer-password
      remoteRef:
        key: backup/restic-rest-server/writer-password
    - secretKey: immich-db-password
      remoteRef:
        key: backup/restic-immich-db/password
---
