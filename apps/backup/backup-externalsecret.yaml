apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: restic-admin-creds
  namespace: backup
spec:
  refreshInterval: 12h50m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
