apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-db-backup
  namespace: immich
spec:
  schedule: "20 3 */3 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      activeDeadlineSeconds: 3600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: pg-dump
              image: postgres:16.13
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["NET_RAW"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  pg_dump -U immich -h immich-postgresql immich | gzip > /dump/immich-db.sql.gz
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: immich-secrets
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: dump
                  mountPath: /dump
          containers:
            - name: backup
              image: restic/restic:0.18.1
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["NET_RAW"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  REST_URL="rest:http://${REST_USER}:${REST_PASSWORD}@restic-rest-server.backup.svc.cluster.local:8000/immich-db"
                  restic -r "$REST_URL" snapshots > /dev/null 2>&1 || restic -r "$REST_URL" init
                  restic -r "$REST_URL" backup --host immich /dump
              env:
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-creds
                      key: immich-db-password
                - name: REST_USER
                  valueFrom:
                    secretKeyRef:
                      name: restic-creds
                      key: rest-writer-user
                - name: REST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-creds
                      key: rest-writer-password
              volumeMounts:
                - name: dump
                  mountPath: /dump
                  readOnly: true
          volumes:
            - name: dump
              emptyDir: {}
---
