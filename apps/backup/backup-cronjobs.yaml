apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-minio-backup
  namespace: nextcloud
spec:
  schedule: "0 4 */3 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      activeDeadlineSeconds: 7200
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: nextcloud
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: homelab
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: mc-mirror
              image: minio/mc:RELEASE.2025-08-13T08-35-41Z
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["NET_RAW"]
              env:
                - name: MINIO_ENDPOINT
                  value: "http://minio.minio.svc.cluster.local:9000"
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: nextcloud-s3
                      key: S3_ACCESS_KEY
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: nextcloud-s3
                      key: S3_SECRET_KEY
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  for i in 1 2 3 4 5; do
                    if mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"; then
                      break
                    fi
                    echo "mc alias set failed (attempt $i), retrying in 5s..."
                    sleep 5
                  done
                  echo "== Mirroring minio/nextcloud -> /staging =="
                  mc mirror --overwrite minio/nextcloud /staging
                  echo "== Done =="
              volumeMounts:
                - name: staging
                  mountPath: /staging
          containers:
            - name: backup
              image: restic/restic:0.18.1
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["NET_RAW"]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  REST_URL="rest:http://${REST_USER}:${REST_PASSWORD}@restic-rest-server.backup.svc.cluster.local:8000/nextcloud-minio"
                  restic -r "$REST_URL" snapshots > /dev/null 2>&1 || restic -r "$REST_URL" init
                  restic -r "$REST_URL" backup --host nextcloud /staging
              env:
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-creds
                      key: nextcloud-minio-password
                - name: REST_USER
                  valueFrom:
                    secretKeyRef:
                      name: restic-creds
                      key: rest-writer-user
                - name: REST_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-creds
                      key: rest-writer-password
              volumeMounts:
                - name: staging
                  mountPath: /staging
                  readOnly: true
          volumes:
            - name: staging
              hostPath:
                path: ${BACKUP_PATH}/staging/nextcloud-minio
                type: DirectoryOrCreate
---
