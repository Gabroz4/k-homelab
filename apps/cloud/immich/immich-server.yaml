apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: immich
spec:
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      containers:
      - name: immich-server
        image: ghcr.io/immich-app/immich-server:v2.6.1
        env:
        - name: DB_HOSTNAME
          value: "immich-postgresql"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          value: "immich"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: immich-secrets
              key: DB_PASSWORD
        - name: DB_DATABASE_NAME
          value: "immich"
        - name: REDIS_HOSTNAME
          value: "immich-valkey"
        - name: REDIS_PORT
          value: "6379"
        - name: IMMICH_MACHINE_LEARNING_URL
          value: "http://immich-machine-learning:3003"
        - name: FFMPEG_PATH
          value: "/usr/bin/ffmpeg"
        - name: FFPROBE_PATH  
          value: "/usr/bin/ffprobe"
        ports:
        - containerPort: 2283
          name: http
        volumeMounts:
        - name: library
          mountPath: /usr/src/app/upload
        livenessProbe:
          httpGet:
            path: /api/server/ping
            port: 2283
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/server/ping
            port: 2283
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 200m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 3Gi

      volumes:
      - name: library
        persistentVolumeClaim:
          claimName: immich-library
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: increase-buffer
  namespace: immich
spec:
  buffering:
    maxRequestBodyBytes: 0
    maxResponseBodyBytes: 0
    memRequestBodyBytes: 0
    memResponseBodyBytes: 0

