apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cron
  namespace: nextcloud
  labels:
    app: nextcloud
    component: cron
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: nextcloud
            component: cron-job
        spec:
          restartPolicy: Never
          securityContext:
            fsGroup: 33
          containers:
            - name: nextcloud-cron
              image: nextcloud:32.0.5-apache
              command:
                - /bin/bash
                - -c
                - |
                  ulimit -n 65536 || true
                  su -s /bin/bash www-data -c "php -f /var/www/html/cron.php"
              volumeMounts:
                - mountPath: /var/www/
                  name: nextcloud-main
                  subPath: root
                - mountPath: /var/www/html
                  name: nextcloud-main
                  subPath: html
                - mountPath: /var/www/html/data
                  name: nextcloud-main
                  subPath: data
                - mountPath: /var/www/html/config
                  name: nextcloud-main
                  subPath: config
                - mountPath: /var/www/html/custom_apps
                  name: nextcloud-main
                  subPath: custom_apps
                - mountPath: /var/www/tmp
                  name: nextcloud-main
                  subPath: tmp
                - mountPath: /var/www/html/themes
                  name: nextcloud-main
                  subPath: themes
              env:
                - name: POSTGRES_HOST
                  value: nextcloud-postgresql
                - name: REDIS_HOST
                  value: nextcloud-redis-master
                - name: PHP_MEMORY_LIMIT
                  value: "2G"
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: nextcloud-s3
                      key: S3_ACCESS_KEY
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: nextcloud-s3
                      key: S3_SECRET_KEY
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 512Mi
          volumes:
            - name: nextcloud-main
              persistentVolumeClaim:
                claimName: nextcloud-nextcloud
