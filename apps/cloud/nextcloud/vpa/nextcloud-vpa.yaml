apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nextcloud-vpa
  namespace: nextcloud
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nextcloud
  updatePolicy:
    updateMode: InPlaceOrRecreate
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: jellyfin-vpa
  namespace: jellyfin
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jellyfin
  updatePolicy:
    updateMode: InPlaceOrRecreate
