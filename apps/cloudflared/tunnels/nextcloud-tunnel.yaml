apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-nextcloud
  namespace: cloudflared
spec:
  selector:
    matchLabels:
      app: cloudflared-nextcloud
  template:
    metadata:
      labels:
        app: cloudflared-nextcloud
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - ${STATELESS_NODE}
      tolerations:
        - key: workload
          operator: Equal
          value: stateless
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.5.2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nextcloud-tunnel-token
                  key: token
          command:
            - cloudflared
            - tunnel
            - --no-autoupdate
            - run
          livenessProbe:
            exec:
              command:
                - cloudflared
                - tunnel
                - --version
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-tunnel-token
  namespace: cloudflared
spec:
  refreshInterval: 12h30m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: nextcloud-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: cloudflared/nextcloud-tunnel-token/token
