apiVersion: apps/v1
kind: Deployment
metadata:
  name: pankha-agent-homelab
  namespace: pankha
  labels:
    app: pankha-agent-homelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pankha-agent-homelab
  template:
    metadata:
      labels:
        app: pankha-agent-homelab
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      initContainers:
        - name: download-agent
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              set -eu
              wget -q -O /agent/pankha-agent \
                "https://github.com/Anexgohan/pankha/releases/download/v0.4.24/pankha-agent-linux_x64"
              chmod +x /agent/pankha-agent
              cp /config/config.json /agent/config.json
          volumeMounts:
            - name: agent-dir
              mountPath: /agent
            - name: config
              mountPath: /config
              readOnly: true
        - name: enable-pwm
          image: alpine:3.23
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              for h in /sys/class/hwmon/hwmon*; do
                [ "$(cat "$h/name" 2>/dev/null)" = "nct6793" ] || continue
                echo 1 > "$h/pwm1_enable" || true
                echo 1 > "$h/pwm2_enable" || true
                break
              done
          volumeMounts:
            - name: sys
              mountPath: /sys
      containers:
        - name: pankha-agent
          image: debian:stable-slim
          workingDir: /agent
          command:
            - /agent/pankha-agent
            - --daemon-child
          env:
            - name: TZ
              value: "${TIMEZONE}"
            - name: LOG_LEVEL
              value: "info"
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: agent-dir
              mountPath: /agent
            - name: sys
              mountPath: /sys
      volumes:
        - name: agent-dir
          emptyDir: {}
        - name: config
          configMap:
            name: pankha-agent-homelab-config
        - name: sys
          hostPath:
            path: /sys
            type: Directory
