apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pankha-secrets
  namespace: pankha
spec:
  refreshInterval: 14h55m
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: pankha-secrets
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: pankha/pankha-secrets/POSTGRES_USER
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: pankha/pankha-secrets/POSTGRES_PASSWORD
    - secretKey: POSTGRES_DB
      remoteRef:
        key: pankha/pankha-secrets/POSTGRES_DB
    - secretKey: JWT_SECRET
      remoteRef:
        key: pankha/pankha-secrets/JWT_SECRET
    - secretKey: SESSION_SECRET
      remoteRef:
        key: pankha/pankha-secrets/SESSION_SECRET
