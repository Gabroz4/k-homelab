# Centralino reverse proxy.
#
# The SPA is served from /. The browser never learns the ESP32 IPs directly:
# /api/{sb,tv,gr}/<path> is proxied here to the matching ESP32 on the LAN.
# That way the page works from outside the LAN through the Cloudflare tunnel,
# not only when the browser sits on the same WiFi as the sensors.

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: serve static, fall back to index.html for client-side routes.
  location / {
    try_files $uri /index.html;
  }

  # Long cache for fingerprinted assets (no-op today: the SPA is one file).
  location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|svg)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # --- ESP32 proxy zones ------------------------------------------------
  # Short timeouts so the SPA gets a fast failure when a sonda is offline,
  # instead of hanging the page for the default 60s.

  # Sala/Balcone + Lavagna (Piano 1)
  location /api/sb/ {
    proxy_pass http://192.168.1.27/;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header Connection "";
    proxy_connect_timeout 3s;
    proxy_send_timeout    5s;
    proxy_read_timeout    5s;
  }

  # Taverna (Piano Terra)
  location /api/tv/ {
    proxy_pass http://192.168.1.19/;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header Connection "";
    proxy_connect_timeout 3s;
    proxy_send_timeout    5s;
    proxy_read_timeout    5s;
  }

  # Garage
  location /api/gr/ {
    proxy_pass http://192.168.1.109/;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header Connection "";
    proxy_connect_timeout 3s;
    proxy_send_timeout    5s;
    proxy_read_timeout    5s;
  }
}
