apiVersion: apps/v1
kind: Deployment
metadata:
  name: centralino
  namespace: centralino
spec:
  replicas: 1
  selector:
    matchLabels:
      app: centralino
  template:
    metadata:
      labels:
        app: centralino
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - ${STATELESS_NODE}
      tolerations:
        - key: workload
          operator: Equal
          value: stateless
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.31-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: site
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: nginx-conf
          configMap:
            name: centralino-nginx
        - name: site
          configMap:
            name: centralino-site
---
apiVersion: v1
kind: Service
metadata:
  name: centralino
  namespace: centralino
spec:
  selector:
    app: centralino
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
