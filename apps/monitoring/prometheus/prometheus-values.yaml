#helm upgrade monitoring prometheus-community/kube-prometheus-stack -n monitoring -f prometheus-values.yaml -f grafana-values.yaml
defaultRules:
  disabled:
    KubeMemoryOvercommit: true

prometheus:
  prometheusSpec:
    retention: 14d
    retentionSize: 18GB
    resources:
      requests:
        cpu: 500m
        memory: 768Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: longhorn
          resources:
            requests:
              storage: 25Gi

    additionalScrapeConfigs:
      - job_name: "loki"
        static_configs:
          - targets: ["loki.monitoring.svc.cluster.local:3100"]

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    secrets:
      - alertmanager-telegram
    tolerations:
      - key: workload
        operator: Equal
        value: stateless
        effect: NoSchedule
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - pi-node
  config:
    route:
      receiver: 'null'
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = "critical"
          receiver: telegram
          repeat_interval: 1h
        - matchers:
            - severity = "warning"
          receiver: telegram
          repeat_interval: 4h
    receivers:
      - name: 'null'
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot-token
            chat_id: 714757023
            parse_mode: HTML
            message: |
              <b>{{ .Status | toUpper }}{{ if eq .Status "firing" }} 🔥{{ else }} ✅{{ end }}</b> {{ .CommonLabels.alertname }}
              {{ range .Alerts -}}
              <b>{{ .Labels.severity }}</b> · {{ .Labels.namespace }}/{{ if .Labels.pod }}{{ .Labels.pod }}{{ else }}-{{ end }}
              {{ .Annotations.summary }}
              {{ if .Annotations.description }}<i>{{ .Annotations.description }}</i>{{ end }}
              {{ end }}

kubeStateMetrics:
  enabled: true

# k3s embeds controller-manager, scheduler, kube-proxy into a single binary
# without exposing the standard metrics endpoints; default mode uses SQLite
# instead of etcd. Disable the corresponding ServiceMonitors and alerts to
# avoid permanent false positives.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - pi-node
  tolerations:
    - key: workload
      operator: Equal
      value: stateless
      effect: NoSchedule

kube-state-metrics:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - pi-node
  tolerations:
    - key: workload
      operator: Equal
      value: stateless
      effect: NoSchedule
