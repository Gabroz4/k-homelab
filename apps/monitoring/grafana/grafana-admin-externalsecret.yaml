apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: adminUser
      remoteRef:
        key: monitoring/grafana-admin-credentials/adminUser
    - secretKey: adminPassword
      remoteRef:
        key: monitoring/grafana-admin-credentials/adminPassword
