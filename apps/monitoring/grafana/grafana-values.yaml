grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: adminUser
    passwordKey: adminPassword
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  plugins:
    - grafana-lokiexplore-app
  envValueFrom:
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-authentik-oauth
        key: client-id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-authentik-oauth
        key: client-secret
  grafana.ini:
    feature_toggles:
      enable: lokiExploreDataVisualization
    server:
      root_url: https://grafana.gabro.ovh
    auth:
      signout_redirect_url: "https://authentik.gabro.ovh/application/o/grafana/end-session/"
      oauth_auto_login: true
    auth.generic_oauth:
      enabled: true
      name: Authentik
      scopes: "openid email profile"
      auth_url: "https://authentik.gabro.ovh/application/o/authorize/"
      token_url: "http://authentik-server.authentik.svc.cluster.local/application/o/token/"
      api_url: "http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/"
      role_attribute_path: "contains(groups[*], 'admin') && 'Admin' || 'Viewer'"

  sidecar:
    datasources:
      enabled: false
    dashboards:
      enabled: false

  extraVolumes:
    - name: datasources-direct
      configMap:
        name: grafana-datasources
  extraVolumeMounts:
    - name: datasources-direct
      mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
      subPath: datasource.yaml

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "kubernetes"
          orgId: 1
          folder: "Kubernetes"
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes
        - name: "storage"
          orgId: 1
          folder: "Storage"
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/storage
        - name: "logs"
          orgId: 1
          folder: "Logs"
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/logs
        - name: "networking"
          orgId: 1
          folder: "Networking"
          type: file
          disableDeletion: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/networking

  dashboards:
    kubernetes:
      k8s-views-global:
        gnetId: 15757
        revision: 43
        datasource: Prometheus
      k8s-views-namespaces:
        gnetId: 15758
        revision: 42
        datasource: Prometheus
      k8s-views-nodes:
        gnetId: 15759
        revision: 35
        datasource: Prometheus
      k8s-views-pods:
        gnetId: 15760
        revision: 38
        datasource: Prometheus
      k8s-system-coredns:
        gnetId: 15762
        revision: 22
        datasource: Prometheus
      k8s-system-api-server:
        gnetId: 15761
        revision: 21
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
    storage:
      longhorn:
        gnetId: 16888
        revision: 9
        datasource: Prometheus
    logs:
      loki-kubernetes-logs:
        gnetId: 17781
        revision: 1
        datasource: Loki
      container-log-search:
        gnetId: 16966
        revision: 1
        datasource: Loki
      alloy-overview:
        gnetId: 20033
        revision: 3
        datasource: Prometheus
    networking:
      traefik:
        gnetId: 17346
        revision: 9
        datasource: Prometheus
