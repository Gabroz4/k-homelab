grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: adminUser
    passwordKey: adminPassword
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
