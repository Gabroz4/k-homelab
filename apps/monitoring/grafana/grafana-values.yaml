grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: adminUser
    passwordKey: adminPassword
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 5Gi

  deploymentStrategy:
    type: Recreate

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  plugins:
    - grafana-lokiexplore-app
    - grafana-k8s-app

  envFromSecrets:
    - name: grafana-authentik-oauth

  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000

  grafana.ini:
    feature_toggles:
      enable: lokiExploreDataVisualization
    server:
      root_url: https://grafana.gabro.ovh

    auth:
      signout_redirect_url: "https://authentik.gabro.ovh/application/o/grafana/end-session/"
      oauth_auto_login: true

    auth.generic_oauth:
      enabled: true
      name: Authentik
      client_id: $__env{client-id}
      client_secret: $__env{client-secret}
      scopes: "openid email profile"
      auth_url: "https://authentik.gabro.ovh/application/o/authorize/"
      token_url: "https://authentik.gabro.ovh/application/o/token/"
      api_url: "https://authentik.gabro.ovh/application/o/userinfo/"
      role_attribute_path: "contains(groups[*], 'admin') && 'Admin' || 'Viewer'"
