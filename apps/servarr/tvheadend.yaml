apiVersion: apps/v1
kind: Deployment
metadata:
  name: tvheadend
  namespace: jellyfin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tvheadend
  template:
    metadata:
      labels:
        app: tvheadend
    spec:
      nodeSelector:
        kubernetes.io/hostname: homelab
      containers:
        - name: tvheadend
          image: lscr.io/linuxserver/tvheadend:latest@sha256:ccd9f055f0eb5c78c43b40397e35ff30a884a40389222ef04f2e33efecbd3067
          securityContext:
            privileged: true
          ports:
            - containerPort: 9981
            - containerPort: 9982
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "44"
            - name: TZ
              value: "${TIMEZONE}"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: dvb
              mountPath: /dev/dvb
          livenessProbe:
            tcpSocket:
              port: 9981
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 9981
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: config
          hostPath:
            path: /var/lib/tvheadend
            type: DirectoryOrCreate
        - name: dvb
          hostPath:
            path: /dev/dvb
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: tvheadend
  namespace: jellyfin
spec:
  selector:
    app: tvheadend
  ports:
    - name: http
      port: 9981
      targetPort: 9981
    - name: htsp
      port: 9982
      targetPort: 9982
