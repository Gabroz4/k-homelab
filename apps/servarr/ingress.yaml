apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: servarr
  namespace: jellyfin
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - prowlarr.${LOCAL_DOMAIN}
        - sonarr.${LOCAL_DOMAIN}
        - radarr.${LOCAL_DOMAIN}
        - seerr.${LOCAL_DOMAIN}
        - qbittorrent.${LOCAL_DOMAIN}
        - dispatcharr.${LOCAL_DOMAIN}
      secretName: wildcard-local-tls
  rules:
  - host: prowlarr.${LOCAL_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prowlarr
            port:
              number: 9696

  - host: sonarr.${LOCAL_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sonarr
            port:
              number: 8989

  - host: radarr.${LOCAL_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: radarr
            port:
              number: 7878

  - host: seerr.${LOCAL_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: seerr
            port:
              number: 5055

  - host: qbittorrent.${LOCAL_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qbittorrent
            port:
              number: 8080

  - host: dispatcharr.${LOCAL_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dispatcharr
            port:
              number: 9191
