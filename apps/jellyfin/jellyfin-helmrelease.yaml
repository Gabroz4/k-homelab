apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 1h
  releaseName: jellyfin
  chart:
    spec:
      chart: jellyfin
      version: "3.2.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    image:
      repository: jellyfin/jellyfin
      tag: latest
      pullPolicy: IfNotPresent

    replicaCount: 1
    strategy:
      type: Recreate

    env:
      TZ: ${TIMEZONE}

    service:
      main:
        type: ClusterIP
        ports:
          http:
            port: 8096

    ingress:
      main:
        enabled: false

    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: "local-path"
        accessMode: ReadWriteOnce
        size: 10Gi

      media:
        enabled: true
        type: hostPath
        hostPath: ${MEDIA_PATH}
        mountPath: /media

      cache:
        enabled: true
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi

    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "6"
        memory: "2Gi"
