apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  releaseName: loki
  chart:
    spec:
      chart: loki
      version: "7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false

      commonConfig:
        replication_factor: 1

      storage:
        type: filesystem

      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      limits_config:
        ingestion_rate_mb: 10
        ingestion_burst_size_mb: 20
        max_streams_per_user: 0
        max_concurrent_tail_requests: 10
        retention_period: 168h
        allow_structured_metadata: true

      rulerConfig:
        alertmanager_url: http://monitoring-kube-prometheus-alertmanager.monitoring.svc.cluster.local:9093

    singleBinary:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1
          memory: 1Gi
      persistence:
        enabled: true
        enableStatefulSetAutoDeletePVC: false
        size: 20Gi
        storageClass: longhorn

    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false

    chunksCache:
      enabled: false

    resultsCache:
      enabled: false

    gateway:
      enabled: false

    minio:
      enabled: false

    test:
      enabled: false

    sidecar:
      image:
        registry: docker.io
        repository: kiwigrid/k8s-sidecar
        tag: "2.8.1"
