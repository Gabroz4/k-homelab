apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-local-tls
  namespace: kube-system
spec:
  secretName: wildcard-local-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.${LOCAL_DOMAIN}"
  dnsNames:
    - "${LOCAL_DOMAIN}"
    - "*.${LOCAL_DOMAIN}"
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
