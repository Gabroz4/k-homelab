apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: kube-system
spec:
  interval: 1h
  releaseName: descheduler
  chart:
    spec:
      chart: descheduler
      version: "0.36.0"
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    kind: CronJob
    schedule: "*/30 * * * *"
    timeZone: ${TIMEZONE}
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 1
    deschedulerPolicyAPIVersion: "descheduler/v1alpha2"
    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 10
      profiles:
        - name: pi-node-affinity
          pluginConfig:
            - name: DefaultEvictor
              args:
                nodeFit: true
                podProtections:
                  defaultDisabled:
                    - PodsWithLocalStorage
                  extraEnabled:
                    - PodsWithPVC
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - preferredDuringSchedulingIgnoredDuringExecution
          plugins:
            deschedule:
              enabled:
                - RemovePodsViolatingNodeAffinity
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
