---
name: kubeconform

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/**
      - infrastructure/**
      - clusters/**
      - .github/workflows/kubeconform.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  kubeconform:
    name: Validate manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        run: |
          version=v0.6.7
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/${version}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /tmp kubeconform
          sudo install /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate
        run: |
          set -euo pipefail

          schema_args=(
            -strict
            -ignore-missing-schemas
            -summary
            -schema-location default
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          )

          paths=(clusters/homelab infrastructure/configs infrastructure/controllers)
          for d in apps/*/; do
            paths+=("${d%/}")
          done

          fail=0
          for d in "${paths[@]}"; do
            [[ -f "$d/kustomization.yaml" ]] || continue
            echo "::group::$d"
            if ! kubectl kustomize "$d" | kubeconform "${schema_args[@]}"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail
