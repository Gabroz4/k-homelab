version: '3'

tasks:
  default:
    silent: true
    cmds:
      - task --list-all

  build:
    desc: Smoke-test kustomize build of apps/ and infrastructure/
    cmds:
      - kubectl kustomize apps/ > /dev/null
      - kubectl kustomize infrastructure/ > /dev/null
      - echo "kustomize OK"

  reconcile:
    desc: Pull latest from git and reconcile every root Kustomization
    cmds:
      - flux reconcile source git flux-system
      - flux reconcile kustomization flux-system
      - flux reconcile kustomization infrastructure-configs
      - flux reconcile kustomization infrastructure-controllers
      - flux reconcile kustomization apps

  reconcile-hr:
    desc: 'Reconcile one HelmRelease — task reconcile-hr ns=monitoring name=loki'
    requires:
      vars: [ns, name]
    cmds:
      - flux -n {{.ns}} reconcile helmrelease {{.name}}

  reconcile-ks:
    desc: 'Reconcile one app Kustomization — task reconcile-ks name=nextcloud'
    requires:
      vars: [name]
    cmds:
      - flux -n flux-system reconcile kustomization {{.name}}

  status:
    desc: Overview of Flux state
    cmds:
      - flux get kustomizations -A
      - flux get helmreleases -A
      - flux get sources git -A
      - flux get sources helm -A

  bad:
    desc: Show Flux resources that are not Ready and pods not Running
    ignore_error: true
    cmds:
      - flux get kustomizations -A --status-selector=ready=false
      - flux get helmreleases -A --status-selector=ready=false
      - kubectl get pods -A --field-selector=status.phase!=Running,status.phase!=Succeeded

  sync-es:
    desc: 'Force ExternalSecret re-sync — task sync-es ns=nextcloud name=nextcloud-secrets'
    requires:
      vars: [ns, name]
    cmds:
      - kubectl annotate externalsecret {{.name}} force-sync=$(date +%s) --overwrite -n {{.ns}}

  logs:
    desc: 'Follow logs for a Deployment — task logs ns=monitoring name=loki'
    requires:
      vars: [ns, name]
    cmds:
      - kubectl -n {{.ns}} logs deployment/{{.name}} --follow

  events:
    desc: Recent non-Normal events across the cluster
    cmds:
      - kubectl get events -A --field-selector type!=Normal --sort-by=.lastTimestamp

  diff:
    desc: 'Preview what a Kustomization would change — task diff name=apps path=./apps'
    requires:
      vars: [name, path]
    cmds:
      - flux diff kustomization {{.name}} --path {{.path}}

  tree:
    desc: 'List every resource a Kustomization manages — task tree name=nextcloud'
    requires:
      vars: [name]
    cmds:
      - flux tree kustomization {{.name}}

  restart:
    desc: 'Roll a Deployment and wait — task restart ns=nextcloud name=nextcloud'
    requires:
      vars: [ns, name]
    cmds:
      - kubectl -n {{.ns}} rollout restart deployment/{{.name}}
      - kubectl -n {{.ns}} rollout status deployment/{{.name}}

  suspend:
    desc: 'Pause Flux on a HelmRelease (for manual intervention) — task suspend ns=monitoring name=loki'
    requires:
      vars: [ns, name]
    cmds:
      - flux -n {{.ns}} suspend helmrelease {{.name}}

  resume:
    desc: 'Resume Flux on a HelmRelease — task resume ns=monitoring name=loki'
    requires:
      vars: [ns, name]
    cmds:
      - flux -n {{.ns}} resume helmrelease {{.name}}

  webhook-url:
    desc: Print the GitHub webhook URL to paste into the repo's webhook settings
    cmds:
      - 'echo "https://flux-webhook.gabro.ovh$(kubectl -n flux-system get receiver github-receiver -o jsonpath=''{.status.webhookPath}'')"'

  secrets-list:
    desc: All BWS-managed ExternalSecrets with sync status
    cmds:
      - kubectl get externalsecret -A

  rotate-bws:
    desc: 'Generic BWS rotation — task rotate-bws ns=X name=Y [deploy=Z]. Update BW first, then run; force-syncs the ExternalSecret and optionally rolls a Deployment.'
    requires:
      vars: [ns, name]
    cmds:
      - kubectl -n {{.ns}} annotate externalsecret {{.name}} force-sync=$(date +%s) --overwrite
      - sleep 3
      - |
        if [ -n "{{.deploy}}" ]; then
          kubectl -n {{.ns}} rollout restart deploy/{{.deploy}}
          kubectl -n {{.ns}} rollout status deploy/{{.deploy}}
        else
          echo "skipped restart (no deploy= given; rely on Reloader annotation if present)"
        fi

  rotate-tunnel:
    desc: 'Rotate a Cloudflare tunnel token — task rotate-tunnel svc=jellyfin. Generate new token in CF dash for the SAME tunnel, update BW under cloudflared/<svc>-tunnel-token/token, then run.'
    requires:
      vars: [svc]
    cmds:
      - kubectl -n cloudflared annotate externalsecret {{.svc}}-tunnel-token force-sync=$(date +%s) --overwrite
      - sleep 3
      - kubectl -n cloudflared rollout restart deploy/cloudflared-{{.svc}}
      - kubectl -n cloudflared rollout status deploy/cloudflared-{{.svc}}

  rotate-cloudflare-api:
    desc: 'Rotate the Cloudflare API token used by cert-manager. Generate new token in CF dash (Zone:DNS:Edit for the zone), update BW under cert-manager/cloudflare-api-token/api-token, then run.'
    cmds:
      - kubectl -n cert-manager annotate externalsecret cloudflare-api-token force-sync=$(date +%s) --overwrite
      - echo "Token rotated. Cert-manager picks it up on next reconciliation; no restart needed."

  rotate-webhook-hmac:
    desc: 'Rotate the Flux GitHub webhook HMAC. Generate new in GitHub repo Settings → Webhooks, update BW under flux-system/github-webhook-token/token, then run.'
    cmds:
      - kubectl -n flux-system annotate externalsecret github-webhook-token force-sync=$(date +%s) --overwrite
      - sleep 3
      - kubectl -n flux-system rollout restart deploy/notification-controller
      - kubectl -n flux-system rollout status deploy/notification-controller

  rotate-grafana-admin:
    desc: 'Rotate the Grafana admin password. Update BW under monitoring/grafana-admin-credentials/admin-password, then run. Existing browser sessions persist until cookie expiry.'
    cmds:
      - kubectl -n monitoring annotate externalsecret grafana-admin-credentials force-sync=$(date +%s) --overwrite
      - sleep 3
      - kubectl -n monitoring rollout restart deploy/monitoring-grafana
      - kubectl -n monitoring rollout status deploy/monitoring-grafana

  rotate-postgres:
    desc: 'Rotate a Postgres password — task rotate-postgres app=nextcloud (one of nextcloud, authentik, immich, pankha). Update BW with new password first, then run; the task ALTERs the user with the new password and rolls consumers.'
    requires:
      vars: [app]
    vars:
      PG_POD:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "nextcloud-postgresql-0" ;;
            authentik) echo "authentik-postgresql-0" ;;
            immich)    echo "immich-postgresql-0" ;;
            pankha)    kubectl -n pankha get pod -l app=pankha-postgres -o jsonpath='{.items[0].metadata.name}' ;;
            *) echo "ERR_UNKNOWN_APP" ;;
          esac
      PG_USER:
        sh: echo "{{.app}}"
      PG_DB:
        sh: echo "{{.app}}"
      ES_NAME:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "nextcloud-db" ;;
            authentik) echo "authentik-credentials" ;;
            immich)    echo "immich-secrets" ;;
            pankha)    echo "pankha-secrets" ;;
          esac
      PW_KEY:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "db-password" ;;
            authentik) echo "postgresql-password" ;;
            immich)    echo "POSTGRES_PASSWORD" ;;
            pankha)    echo "POSTGRES_PASSWORD" ;;
          esac
      CONSUMERS:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "deploy/nextcloud" ;;
            authentik) echo "deploy/authentik-server deploy/authentik-worker" ;;
            immich)    echo "deploy/immich-server deploy/immich-machine-learning" ;;
            pankha)    echo "deploy/pankha-app" ;;
          esac
    cmds:
      - |
        set -eu
        [ "{{.PG_POD}}" = "ERR_UNKNOWN_APP" ] && { echo "Unknown app '{{.app}}'. Valid: nextcloud, authentik, immich, pankha"; exit 1; }
        OLD_PW=$(kubectl -n {{.app}} get secret {{.ES_NAME}} -o jsonpath="{.data['{{.PW_KEY}}']}" | base64 -d)
        kubectl -n {{.app}} annotate externalsecret {{.ES_NAME}} force-sync=$(date +%s) --overwrite
        sleep 5
        NEW_PW=$(kubectl -n {{.app}} get secret {{.ES_NAME}} -o jsonpath="{.data['{{.PW_KEY}}']}" | base64 -d)
        if [ "$OLD_PW" = "$NEW_PW" ]; then
          echo "ERROR: Secret value did not change after force-sync. Update Bitwarden first."
          exit 1
        fi
        echo "Changing Postgres user '{{.PG_USER}}' password in {{.PG_POD}}..."
        kubectl -n {{.app}} exec -i {{.PG_POD}} -- env PGPASSWORD="$OLD_PW" psql -h localhost -U {{.PG_USER}} -d {{.PG_DB}} -v ON_ERROR_STOP=1 <<SQL
        ALTER USER "{{.PG_USER}}" WITH PASSWORD '$NEW_PW';
        SQL
        echo "Rolling consumers: {{.CONSUMERS}}"
        kubectl -n {{.app}} rollout restart {{.CONSUMERS}}
        kubectl -n {{.app}} rollout status {{.CONSUMERS}} --timeout=180s

  autorotate-bws:
    desc: 'Generate + write BW + force-sync + restart — task autorotate-bws ns=X name=Y field=Z [deploy=W]. Fully automated rotation for simple BWS-only secrets; no third-party UI involved.'
    requires:
      vars: [ns, name, field]
    cmds:
      - |
        set -eu
        KEY="{{.ns}}/{{.name}}/{{.field}}"
        echo "Rotating BW key: $KEY"
        ./scripts/bws-rotate.sh rotate "$KEY" >/dev/null
        kubectl -n {{.ns}} annotate externalsecret {{.name}} force-sync=$(date +%s) --overwrite
        sleep 3
        if [ -n "{{.deploy}}" ]; then
          kubectl -n {{.ns}} rollout restart deploy/{{.deploy}}
          kubectl -n {{.ns}} rollout status  deploy/{{.deploy}} --timeout=180s
        else
          echo "skipped restart (no deploy= given; rely on Reloader annotation if present)"
        fi

  autorotate-postgres:
    desc: 'Generate + write BW + ALTER USER + restart — task autorotate-postgres app=X (nextcloud | authentik | immich | pankha). End-to-end Postgres password rotation.'
    requires:
      vars: [app]
    vars:
      PG_POD:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "nextcloud-postgresql-0" ;;
            authentik) echo "authentik-postgresql-0" ;;
            immich)    echo "immich-postgresql-0" ;;
            pankha)    kubectl -n pankha get pod -l app=pankha-postgres -o jsonpath='{.items[0].metadata.name}' ;;
            *) echo "ERR_UNKNOWN_APP" ;;
          esac
      ES_NAME:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "nextcloud-db" ;;
            authentik) echo "authentik-credentials" ;;
            immich)    echo "immich-secrets" ;;
            pankha)    echo "pankha-secrets" ;;
          esac
      PW_KEY:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "db-password" ;;
            authentik) echo "postgresql-password" ;;
            immich)    echo "POSTGRES_PASSWORD" ;;
            pankha)    echo "POSTGRES_PASSWORD" ;;
          esac
      BW_KEYS:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "nextcloud/nextcloud-db/db-password" ;;
            authentik) echo "authentik/authentik-credentials/postgresql-password" ;;
            immich)    echo "immich/immich-secrets/POSTGRES_PASSWORD immich/immich-secrets/DB_PASSWORD" ;;
            pankha)    echo "pankha/pankha-secrets/POSTGRES_PASSWORD" ;;
          esac
      CONSUMERS:
        sh: |
          case "{{.app}}" in
            nextcloud) echo "deploy/nextcloud" ;;
            authentik) echo "deploy/authentik-server deploy/authentik-worker" ;;
            immich)    echo "deploy/immich-server deploy/immich-machine-learning" ;;
            pankha)    echo "deploy/pankha-app" ;;
          esac
    cmds:
      - |
        set -eu
        [ "{{.PG_POD}}" = "ERR_UNKNOWN_APP" ] && { echo "Unknown app '{{.app}}'. Valid: nextcloud, authentik, immich, pankha"; exit 1; }
        OLD_PW=$(kubectl -n {{.app}} get secret {{.ES_NAME}} -o jsonpath="{.data['{{.PW_KEY}}']}" | base64 -d)
        NEW_PW=$(./scripts/bws-rotate.sh gen)
        echo "Writing new password to BW: {{.BW_KEYS}}"
        for k in {{.BW_KEYS}}; do
          ./scripts/bws-rotate.sh set "$k" "$NEW_PW"
        done
        kubectl -n {{.app}} annotate externalsecret {{.ES_NAME}} force-sync=$(date +%s) --overwrite
        sleep 5
        SYNCED=$(kubectl -n {{.app}} get secret {{.ES_NAME}} -o jsonpath="{.data['{{.PW_KEY}}']}" | base64 -d)
        if [ "$SYNCED" != "$NEW_PW" ]; then
          echo "ERROR: k8s Secret did not pick up the new BW value (still old). Force-sync the ES and re-run."
          exit 1
        fi
        echo "ALTER USER {{.PG_USER}} in {{.PG_POD}}..."
        kubectl -n {{.app}} exec -i {{.PG_POD}} -- env PGPASSWORD="$OLD_PW" psql -h localhost -U {{.PG_USER}} -d {{.PG_DB}} -v ON_ERROR_STOP=1 <<SQL
        ALTER USER "{{.PG_USER}}" WITH PASSWORD '$NEW_PW';
        SQL
        echo "Rolling consumers: {{.CONSUMERS}}"
        kubectl -n {{.app}} rollout restart {{.CONSUMERS}}
        kubectl -n {{.app}} rollout status {{.CONSUMERS}} --timeout=180s

  autorotate-minio-root:
    desc: 'Generate + write BW + restart MinIO. Rotates only the rootPassword (rootUser stays).'
    cmds:
      - |
        set -eu
        echo "Rotating BW key: minio/minio-root-credentials/rootPassword"
        ./scripts/bws-rotate.sh rotate "minio/minio-root-credentials/rootPassword" >/dev/null
        kubectl -n minio annotate externalsecret minio-root-credentials force-sync=$(date +%s) --overwrite
        sleep 3
        kubectl -n minio rollout restart deploy/minio
        kubectl -n minio rollout status deploy/minio --timeout=180s

  autorotate-minio-nc-user:
    desc: 'Generate + mc admin user add (overwrite) + write BW + restart Nextcloud. Rotates the non-root nextcloud-access-key user shared by MinIO and Nextcloud.'
    cmds:
      - |
        set -eu
        NEW_PW=$(./scripts/bws-rotate.sh gen)
        ROOT_USER=$(kubectl -n minio get secret minio-root-credentials -o jsonpath='{.data.rootUser}' | base64 -d)
        ROOT_PW=$(kubectl -n minio get secret minio-root-credentials -o jsonpath='{.data.rootPassword}' | base64 -d)
        echo "Authenticating mc with root..."
        kubectl -n minio exec deploy/minio -- mc alias set local http://localhost:9000 "$ROOT_USER" "$ROOT_PW" >/dev/null
        echo "Setting new password for MinIO user 'nextcloud-access-key'..."
        kubectl -n minio exec deploy/minio -- mc admin user add local nextcloud-access-key "$NEW_PW" >/dev/null
        echo "Writing BW key: nextcloud/nextcloud-s3/S3_SECRET_KEY (shared by minio-nextcloud-user and nextcloud-s3 ESs)"
        ./scripts/bws-rotate.sh set "nextcloud/nextcloud-s3/S3_SECRET_KEY" "$NEW_PW"
        kubectl -n minio     annotate externalsecret minio-nextcloud-user force-sync=$(date +%s) --overwrite
        kubectl -n nextcloud annotate externalsecret nextcloud-s3         force-sync=$(date +%s) --overwrite
        sleep 3
        kubectl -n nextcloud rollout restart deploy/nextcloud
        kubectl -n nextcloud rollout status deploy/nextcloud --timeout=180s
